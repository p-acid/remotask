# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit 설정 — repo 단위 리뷰 동작 제어.
# https://docs.coderabbit.ai/getting-started/configure-coderabbit/
language: "ko-KR"
tone_instructions: "Always respond in Korean (한국어). Use technical vocabulary verbatim in English when it improves precision (e.g. forum topic, dispatcher, audit, idempotency)."
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  # spec/plan/research 류 문서는 의도적으로 다듬은 산출물이라 코드 리뷰 가치가
  # 낮고 markdownlint 잡음만 만든다. tests/는 회귀 가드 가치를 위해 포함 유지.
  path_filters:
    - "!specs/**"
    - "!.specify/**"
    - "!CLAUDE.md"
    - "!PRD.md"
chat:
  auto_reply: true
